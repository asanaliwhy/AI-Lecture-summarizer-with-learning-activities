name: Lectura CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.23'
  NODE_VERSION: '20'

jobs:
  # ─── Backend Tests ───
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lectura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run tests
        working-directory: ./backend
        run: go test -v -race -coverprofile=coverage.out ./...
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/lectura_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret-key-for-ci
          GEMINI_API_KEY: test-key

      - name: Build
        working-directory: ./backend
        run: go build -o /dev/null ./...

  # ─── Frontend Tests ───
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: npm run build

  # ─── Docker Build ───
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t lectura-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t lectura-frontend:latest .

      - name: Verify images
        run: |
          docker images | grep lectura
          echo "✅ All images built successfully"

  # ─── Deploy Gate (all required jobs must be green) ───
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, docker-build]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Enforce green required jobs
        run: |
          echo "backend-test:  ${{ needs.backend-test.result }}"
          echo "frontend-test: ${{ needs.frontend-test.result }}"
          echo "docker-build:  ${{ needs.docker-build.result }}"

          test "${{ needs.backend-test.result }}" = "success"
          test "${{ needs.frontend-test.result }}" = "success"
          test "${{ needs.docker-build.result }}" = "success"

          echo "✅ Deploy gate passed. Safe to deploy."

  # ─── Post-deploy smoke checks + simple alert thresholds ───
  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    needs: [deploy-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Build and start stack
        run: |
          docker compose up -d --build

      - name: Wait for app readiness
        run: |
          for i in {1..30}; do
            if curl -k -fsS https://localhost:3443/api/v1/health >/dev/null; then
              echo "App is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "App did not become healthy in time"
          exit 1

      - name: Run smoke checks (auth, summary endpoint reachability, websocket)
        run: |
          npm ci
          npm run smoke

      - name: Uptime/latency threshold check (alert gate)
        run: |
          METRICS=$(curl -k -fsS https://localhost:3443/metrics)
          echo "$METRICS"

          UPTIME=$(echo "$METRICS" | awk '/^lectura_process_uptime_seconds / {print $2}')
          LATENCY=$(echo "$METRICS" | awk '/^lectura_request_latency_ms_avg / {print $2}')

          : "${UPTIME:=0}"
          : "${LATENCY:=9999}"

          if [ "$UPTIME" -lt 10 ]; then
            echo "Uptime too low for smoke window: $UPTIME"
            exit 1
          fi

          LAT_INT=$(printf '%.0f' "$LATENCY")
          if [ "$LAT_INT" -gt 1000 ]; then
            echo "Average latency too high: ${LATENCY}ms"
            exit 1
          fi

          echo "✅ Uptime/latency thresholds passed"

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --no-color > smoke-failure.log

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failure-logs
          path: smoke-failure.log

      - name: Shutdown stack
        if: always()
        run: docker compose down -v
