services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: lectura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - lectura_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: lectura-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - lectura_redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Go Backend ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lectura-backend
    restart: unless-stopped
    environment:
      ENV: ${ENV:-production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      GEMINI_REQUESTS_PER_MINUTE: ${GEMINI_REQUESTS_PER_MINUTE:-30}
      GEMINI_TOKENS_PER_MINUTE: ${GEMINI_TOKENS_PER_MINUTE:-500000}
      GEMINI_CONCURRENT_REQUESTS: ${GEMINI_CONCURRENT_REQUESTS:-3}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_PATH: /app/uploads
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST is required}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?SMTP_USER is required}
      SMTP_PASS: ${SMTP_PASS:?SMTP_PASS is required}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PORT: "8081"
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    volumes:
      - lectura_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/api/v1/health" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Frontend (Nginx) ───
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lectura-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
      - "${FRONTEND_SSL_PORT:-3443}:443"
    volumes:
      - ${TLS_CERT_PATH:?TLS_CERT_PATH is required}:/etc/nginx/ssl/cert.pem:ro
      - ${TLS_KEY_PATH:?TLS_KEY_PATH is required}:/etc/nginx/ssl/key.pem:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  lectura_pgdata:
  lectura_redis:
  lectura_uploads:
